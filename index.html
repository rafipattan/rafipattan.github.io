<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
        }
        .project {
            background: #ffffff;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .project img {
            width: 100%;
        }
        .project-description {
            padding: 15px;
        }
    </style>
    <script>
        function showAlert() {
            alert('Project clicked!');
        }
    </script>
</head>
<body>
    <header>
        <h1>My Premium Portfolio</h1>
    </header>
    <div class="portfolio">
        <div class="project" onclick="showAlert()">
            <img src="project1.jpg" alt="Project 1">
            <div class="project-description">
                <h2>Project 1</h2>
                <p>A brief description of Project 1.</p>
            </div>
        </div>
        <div class="project" onclick="showAlert()">
            <img src="project2.jpg" alt="Project 2">
            <div class="project-description">
                <h2>Project 2</h2>
                <p>A brief description of Project 2.</p>
            </div>
        </div>
        <div class="project" onclick="showAlert()">
            <img src="project3.jpg" alt="Project 3">
            <div class="project-description">
                <h2>Project 3</h2>
                <p>A brief description of Project 3.</p>
            </div>
        </div>
    </div>
</body>
</html>
