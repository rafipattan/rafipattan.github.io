<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-container input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        .search-container button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .location-btn {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .main-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .city-name {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            margin: 20px auto;
        }

        .temperature {
            font-size: 4rem;
            color: #667eea;
            font-weight: 700;
            margin: 20px 0;
        }

        .weather-description {
            font-size: 1.3rem;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.3rem;
            color: #333;
            font-weight: 600;
        }

        .forecast-container {
            margin-top: 30px;
        }

        .forecast-title {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .forecast-day {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-temp {
            color: #667eea;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 10px 0;
        }

        .forecast-desc {
            color: #999;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2rem;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .search-container {
                flex-direction: column;
                align-items: center;
            }

            .search-container input {
                width: 100%;
                max-width: 400px;
            }

            .temperature {
                font-size: 3rem;
            }

            .main-weather {
                padding: 20px;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </header>

        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..."
                onkeypress="handleEnter(event)"
            >
            <button onclick="searchWeather()">Search</button>
            <button class="location-btn" onclick="getLocationWeather()">📍 Use My Location</button>
        </div>

        <div id="errorContainer"></div>
        <div id="weatherContainer"></div>
        <div id="forecastContainer"></div>
    </div>

    <script>
        const API_KEY = 'e3be5a9c5f35403e9f6cda0e2e4b1c45';

        async function getWeatherData(city) {
            try {
                showLoading();
                const response = await fetch(
                    `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${city}&days=5&aqi=no`
                );

                if (!response.ok) {
                    if (response.status === 400) {
                        showError('City not found. Please try another location.');
                    } else {
                        showError('Error fetching weather data. Please try again.');
                    }
                    return;
                }

                const data = await response.json();
                displayWeather(data);
                displayForecast(data);
                hideError();
            } catch (error) {
                showError('Network error. Please check your connection.');
                console.error('Error:', error);
            }
        }

        function displayWeather(data) {
            const current = data.current;
            const location = data.location;

            const weatherHTML = `
                <div class="main-weather">
                    <div class="city-name">${location.name}, ${location.country}</div>
                    <img src="https:${current.condition.icon}" alt="weather" class="weather-icon">
                    <div class="temperature">${Math.round(current.temp_c)}°C</div>
                    <div class="weather-description">${current.condition.text}</div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${Math.round(current.feelslike_c)}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${Math.round(current.wind_kph)} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${current.pressure_mb} mb</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${current.vis_km} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">${current.uv}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = weatherHTML;
        }

        function displayForecast(data) {
            const forecast = data.forecast.forecastday;
            let forecastHTML = '<div class="forecast-title">5-Day Forecast</div><div class="forecast-grid">';

            forecast.forEach(day => {
                const date = new Date(day.date);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const maxTemp = Math.round(day.day.maxtemp_c);
                const minTemp = Math.round(day.day.mintemp_c);

                forecastHTML += `
                    <div class="forecast-card">
                        <div class="forecast-day">${dayName}</div>
                        <img src="https:${day.day.condition.icon}" alt="weather" class="forecast-icon">
                        <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                        <div class="forecast-desc">${day.day.condition.text}</div>
                    </div>
                `;
            });

            forecastHTML += '</div>';
            document.getElementById('forecastContainer').innerHTML = `
                <div class="forecast-container">${forecastHTML}</div>
            `;
        }

        function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (city) {
                getWeatherData(city);
            } else {
                showError('Please enter a city name.');
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoordinates(latitude, longitude);
                    },
                    (error) => {
                        showError('Unable to access your location. Please enable location services.');
                        console.error('Geolocation error:', error);
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        async function getWeatherByCoordinates(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${lat},${lon}&days=5&aqi=no`
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch weather data');
                }

                const data = await response.json();
                displayWeather(data);
                displayForecast(data);
                hideError();
            } catch (error) {
                showError('Error fetching weather data.');
                console.error('Error:', error);
            }
        }

        function showLoading() {
            document.getElementById('weatherContainer').innerHTML = '<div class="loading">Loading weather data...</div>';
            document.getElementById('forecastContainer').innerHTML = '';
        }

        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `<div class="error">${message}</div>`;
        }

        function hideError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        window.addEventListener('load', () => {
            getWeatherData('London');
        });
    </script>
</body>
</html>
